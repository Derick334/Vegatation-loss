<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nairobi Vegetation Loss Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 15px;
      background: #1b1b1b;
      color: #7CFC00;
      font-size: 28px;
      letter-spacing: 1px;
    }

    #map {
      width: 100%;
      height: 90vh;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 18px;
      color: #333;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Vegetation Loss in Nairobi</h1>

  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // Initialize map centered on Nairobi
    const map = L.map('map').setView([-1.286389, 36.817223], 11);

    // OpenStreetMap Layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Simulated vegetation loss regions
    const vegetationLossAreas = [
      {
        name: "Karura Forest Edge",
        coords: [
          [-1.245, 36.82],
          [-1.255, 36.84],
          [-1.27, 36.83],
          [-1.26, 36.80]
        ],
        level: "High"
      },
      {
        name: "Ngong Road Expansion",
        coords: [
          [-1.31, 36.75],
          [-1.32, 36.78],
          [-1.34, 36.77],
          [-1.33, 36.74]
        ],
        level: "Medium"
      },
      {
        name: "Embakasi Development Zone",
        coords: [
          [-1.32, 36.91],
          [-1.34, 36.93],
          [-1.36, 36.91],
          [-1.35, 36.88]
        ],
        level: "Severe"
      }
    ];

    // Color function
    function getColor(level) {
      switch(level) {
        case "Severe":
          return "#ff0000";
        case "High":
          return "#ff6600";
        case "Medium":
          return "#ffcc00";
        default:
          return "#00ff00";
      }
    }

    // Add polygons
    vegetationLossAreas.forEach(area => {
      L.polygon(area.coords, {
        color: getColor(area.level),
        fillColor: getColor(area.level),
        fillOpacity: 0.5,
        weight: 2
      })
      .addTo(map)
      .bindPopup(`
        <b>${area.name}</b><br>
        Vegetation Loss Level: <b>${area.level}</b>
      `);
    });

    // Legend
    const legend = L.control({ position: "bottomright" });

    legend.onAdd = function () {
      const div = L.DomUtil.create("div", "legend");

      div.innerHTML += "<h4>Vegetation Loss</h4>";

      const levels = [
        { color: "#ff0000", text: "Severe" },
        { color: "#ff6600", text: "High" },
        { color: "#ffcc00", text: "Medium" }
      ];

      levels.forEach(item => {
        div.innerHTML +=
          `<i style="background:${item.color}"></i>${item.text}<br>`;
      });

      return div;
    };

    legend.addTo(map);
  </script>

</body>
</html>

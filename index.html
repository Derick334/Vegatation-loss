<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairobi Vegetation Loss Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
    }

    h1{
      text-align:center;
      background:#1b1b1b;
      color:#7CFC00;
      padding:15px;
      margin:0;
    }

    #map{
      height:90vh;
      width:100%;
    }

    #downloadBtn{
      position:absolute;
      top:10px;
      right:10px;
      z-index:1000;
      padding:10px 15px;
      background:#00c853;
      border:none;
      color:white;
      font-weight:bold;
      cursor:pointer;
      border-radius:6px;
    }

    #downloadBtn:hover{
      background:#00a844;
    }

    .legend{
      background:white;
      padding:10px;
      border-radius:8px;
      color:black;
      line-height:20px;
    }

    .legend i{
      width:18px;
      height:18px;
      float:left;
      margin-right:8px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<h1>Vegetation Loss in Nairobi</h1>

<button id="downloadBtn">Download PDF</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const map = L.map('map').setView([-1.286389, 36.817223], 12.5);

const bounds = [
  [-1.45, 36.65],
  [-1.15, 37.05]
];

map.setMaxBounds(bounds);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

const areas = [
{
  name:"Karura Forest Edge",
  level:"High",
  color:"#ff6600",
  coords:[
    [-1.245,36.82],
    [-1.255,36.84],
    [-1.27,36.83],
    [-1.26,36.80]
  ]
},
{
  name:"Ngong Road Expansion",
  level:"Medium",
  color:"#ffcc00",
  coords:[
    [-1.31,36.75],
    [-1.32,36.78],
    [-1.34,36.77],
    [-1.33,36.74]
  ]
},
{
  name:"Embakasi Development Zone",
  level:"Severe",
  color:"#ff0000",
  coords:[
    [-1.32,36.91],
    [-1.34,36.93],
    [-1.36,36.91],
    [-1.35,36.88]
  ]
}
];

areas.forEach(area=>{
  L.polygon(area.coords,{
    color:area.color,
    fillColor:area.color,
    fillOpacity:0.5,
    weight:2
  })
  .addTo(map)
  .bindPopup(`<b>${area.name}</b><br>Vegetation Loss: ${area.level}`);
});

const legend = L.control({position:'bottomright'});

legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');

  div.innerHTML = `
    <h4>Vegetation Loss</h4>
    <i style="background:#ff0000"></i> Severe<br>
    <i style="background:#ff6600"></i> High<br>
    <i style="background:#ffcc00"></i> Medium
  `;

  return div;
};

legend.addTo(map);

// ---------------- PDF DOWNLOAD ----------------
document.getElementById("downloadBtn").addEventListener("click", async function () {

  const { jsPDF } = window.jspdf;

  html2canvas(document.getElementById("map"), {
    scale: 2   // 🔥 higher quality export
  }).then(canvas => {

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("landscape", "mm", "a4");

    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    pdf.addImage(imgData, "PNG", 0, 0, pageWidth, pageHeight);

    pdf.save("nairobi_vegetation_loss_map.pdf");

  });

});

</script>

</body>
</html>
